name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint with ruff
        run: ruff check est_adapter/ tests/

      - name: Check formatting
        run: ruff format --check est_adapter/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Type check with mypy
        run: mypy est_adapter/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system OpenSSL (for oscrypto)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Configure oscrypto for OpenSSL 3.x
        run: |
          # oscrypto 1.3.0 has known issues detecting OpenSSL 3.x on Ubuntu.
          # Point it at the system libcrypto if detection fails.
          LIBCRYPTO=$(find /usr/lib -name 'libcrypto.so*' -type f 2>/dev/null | head -1)
          if [ -n "$LIBCRYPTO" ]; then
            echo "OSCRYPTO_USE_OPENSSL=$LIBCRYPTO" >> $GITHUB_ENV
          fi

      - name: Run tests with coverage
        run: pytest --cov=est_adapter --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
